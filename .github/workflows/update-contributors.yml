name: Update contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect contributors
        env:
          NUXT_GITHUB_TOKEN: ${{ secrets.NUXT_GITHUB_TOKEN }}
        run: pnpm collect:contributors

      - name: Commit and push if changed
        run: |
          FILE_SIZE=$(wc -c < public/contributors.json)
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "contributors.json is suspiciously small (${FILE_SIZE} bytes) — skipping commit"
            exit 1
          fi
          if git diff --quiet public/contributors.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/contributors.json
          git commit -m "chore: update contributors"
          git push
